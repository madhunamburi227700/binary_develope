basePath: /
definitions:
  client.VulnerabilityOptimization:
    properties:
      allVulnerabilities:
        type: integer
      topPriority:
        type: integer
      uniqueVulnerabilities:
        type: integer
    type: object
  client.VulnerabilityPriority:
    properties:
      priority:
        additionalProperties:
          type: integer
        type: object
      vulnerabilities:
        type: integer
      vulnerabilityPrioritisationData:
        items:
          properties:
            cvss:
              type: number
            epss:
              type: number
            name:
              type: string
            prirorityInt:
              type: integer
            severity:
              type: string
          type: object
        type: array
    type: object
  service.CVERemediationRequest:
    properties:
      branch:
        type: string
      cve_id:
        type: string
      message_type:
        type: string
      organization:
        type: string
      package:
        type: string
      platform:
        type: string
      repository:
        type: string
      scan_result_id:
        type: string
      session_id:
        type: string
      token:
        type: string
      user_message:
        type: string
    type: object
  service.CreateFeedbackRequest:
    properties:
      comments:
        type: string
      rating:
        maximum: 5
        minimum: 0
        type: number
      remediation_id:
        type: string
      vulnerability_id:
        type: string
    required:
    - remediation_id
    - vulnerability_id
    type: object
  service.CreateGitHubIntegrationRequest:
    properties:
      installationId:
        type: string
      name:
        type: string
      team_ids:
        items:
          type: string
        type: array
      timestamp:
        description: for app based access token decryption
        type: integer
      token:
        type: string
    type: object
  service.CreateHubRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      tag:
        type: string
    required:
    - email
    - name
    type: object
  service.CreateProjectRequest:
    properties:
      hub_id:
        type: string
      integration_id:
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      organisation:
        maxLength: 255
        minLength: 1
        type: string
      repoName:
        maxLength: 255
        minLength: 1
        type: string
      type:
        description: user/organisation
        maxLength: 255
        minLength: 1
        type: string
    required:
    - hub_id
    - name
    - organisation
    - repoName
    - type
    type: object
  service.InstallGitHubAppRequest:
    properties:
      installation_id:
        type: integer
      team_ids:
        items:
          type: string
        type: array
    type: object
  service.RescanRequest:
    properties:
      branch:
        type: string
      hubId:
        type: string
      projectId:
        type: string
      repository:
        type: string
    type: object
  service.SASTRemediationRequest:
    properties:
      branch:
        type: string
      file_path:
        type: string
      line_no:
        type: integer
      organization:
        type: string
      platform:
        type: string
      repository:
        type: string
      rule:
        type: string
      rule_message:
        type: string
      scan_result_id:
        type: string
      token:
        type: string
    type: object
  service.UpdateFeedbackRequest:
    properties:
      comments:
        type: string
      rating:
        maximum: 5
        minimum: 0
        type: number
    type: object
  service.ValidateGitHubIntegrationRequest:
    properties:
      name:
        type: string
      team_ids:
        items:
          type: string
        type: array
      token:
        type: string
    type: object
host: localhost:8080
info:
