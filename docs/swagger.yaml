host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: AI Guardian API Service
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: AI Guardian API
  version: "1.0"
paths:
  /api/v1/audit/report:
    get:
      consumes:
      - application/json
      description: Returns the users audit report
      parameters:
      - description: From timestamp/date filter
        in: query
        name: from
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No report found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get users audit report
      tags:
      - Audit
  /api/v1/cspm/deployments:
    get:
      consumes:
      - application/json
      description: Returns deployments associated with the given `commitsha` and `scanid`.
      parameters:
      - description: Commit SHA
        in: query
        name: commitsha
        required: true
        type: string
      - description: Scan ID
        in: query
        name: scanid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM deployments
      tags:
      - CSPM
  /api/v1/cspm/networkmap:
    get:
      consumes:
      - application/json
      description: Fetches the CSPM network map for a given artifact. Either `sha`
        or `name` must be provided.
      parameters:
      - description: Artifact SHA (alternative to name)
        in: query
        name: sha
        type: string
      - description: Artifact name (required if sha not provided)
        in: query
        name: name
        type: string
      - description: Artifact tag (optional when using name)
        in: query
        name: tag
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM network map
      tags:
      - CSPM
  /api/v1/cspm/resources:
    get:
      consumes:
      - application/json
      description: Lists CSPM resources with optional filters and pagination.
      parameters:
      - description: Resource ID
        in: query
        name: id
        type: string
      - description: Cloud provider (e.g. aws, azure, gcp)
        in: query
        name: cloudProvider
        type: string
      - description: Cloud account name
        in: query
        name: cloudAccountName
        type: string
      - description: Resource type
        in: query
        name: resourceType
        type: string
      - description: Resource name
        in: query
        name: name
        type: string
      - description: Resource name regex
        in: query
        name: nameRegex
        type: string
      - description: Filter resources that have findings
        in: query
        name: hasFindings
        type: boolean
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page (default 100)
        in: query
        name: perPage
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: List CSPM resources
      tags:
      - CSPM
  /api/v1/cspm/resources/all:
    get:
      consumes:
      - application/json
      description: Lists all CSPM resources matching filters. Uses a cached backend
        call.
      parameters:
      - description: Resource ID
        in: query
        name: id
        type: string
      - description: Cloud provider (e.g. aws, azure, gcp)
        in: query
        name: cloudProvider
        type: string
      - description: Cloud account name
        in: query
        name: cloudAccountName
        type: string
      - description: Resource type
        in: query
        name: resourceType
        type: string
      - description: Resource name
        in: query
        name: name
        type: string
      - description: Resource name regex
        in: query
        name: nameRegex
        type: string
      - description: Filter resources that have findings
        in: query
        name: hasFindings
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: List all CSPM resources (cached)
      tags:
      - CSPM
  /api/v1/cspm/resources/blast-radius:
    get:
      consumes:
      - application/json
      description: Returns blast radius (dependency graph) for a given resource ID.
      parameters:
      - description: Resource ID
        in: query
        name: id
        required: true
        type: string
      - description: Maximum traversal depth (default 0)
        in: query
        name: maxDepth
        type: integer
      - description: Cloud provider (e.g. aws, azure, gcp)
        in: query
        name: cloudProvider
        type: string
      - description: Cloud account name
        in: query
        name: cloudAccountName
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM resource blast radius
      tags:
      - CSPM
  /api/v1/cspm/resources/summary:
    get:
      consumes:
      - application/json
      description: Returns an aggregated summary of resources for the given filters.
      parameters:
      - description: Cloud provider (e.g. aws, azure, gcp)
        in: query
        name: cloudProvider
        type: string
      - description: Cloud account name
        in: query
        name: cloudAccountName
        type: string
      - description: Filter resources that have findings
        in: query
        name: hasFindings
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM resources summary
      tags:
      - CSPM
  /api/v1/cspm/scan/cloudIntegration:
    get:
      consumes:
      - application/json
      description: Returns cloud security integration scan info (includes last scan
        ID) for the given team.
      parameters:
      - description: Team ID
        in: query
        name: teamId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get cloud integration scan info
      tags:
      - CSPM
  /api/v1/cspm/scan/dashboard:
    get:
      consumes:
      - application/json
      description: Returns CSPM dashboard data for the given account and scan.
      parameters:
      - description: Cloud account name
        in: query
        name: accountName
        required: true
        type: string
      - description: Scan ID
        in: query
        name: scanId
        required: true
        type: string
      - description: Account type (e.g. aws, azure, gcp)
        in: query
        name: accountType
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM dashboard
      tags:
      - CSPM
  /api/v1/cspm/scan/policy/{policyId}:
    get:
      consumes:
      - application/json
      description: Returns CSPM policy details for the given policy ID and scan context.
      parameters:
      - description: Policy ID
        in: path
        name: policyId
        required: true
        type: string
      - description: Account type (e.g. aws, azure, gcp)
        in: query
        name: accountType
        required: true
        type: string
      - description: Cloud account name
        in: query
        name: accountName
        required: true
        type: string
      - description: Scan ID
        in: query
        name: scanId
        required: true
        type: string
      - description: Cloud service name
        in: query
        name: service
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM policy
      tags:
      - CSPM
  /api/v1/cspm/scan/regions:
    get:
      consumes:
      - application/json
      description: Returns a list of regions for the given policy name and scan context.
      parameters:
      - description: Policy name
        in: query
        name: policyName
        required: true
        type: string
      - description: Account type (e.g. aws, azure, gcp)
        in: query
        name: accountType
        required: true
        type: string
      - description: Cloud account name
        in: query
        name: accountName
        required: true
        type: string
      - description: Scan ID
        in: query
        name: scanId
        required: true
        type: string
      - description: Cloud service name
        in: query
        name: service
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM policy regions
      tags:
      - CSPM
  /api/v1/cspm/scan/rulesStatusSummary:
    get:
      consumes:
      - application/json
      description: Returns CSPM rules status summary for the provided account, scan,
        and service.
      parameters:
      - description: Cloud account name
        in: query
        name: accountName
        required: true
        type: string
      - description: Scan ID
        in: query
        name: scanId
        required: true
        type: string
      - description: Account type (e.g. aws, azure, gcp)
        in: query
        name: accountType
        required: true
        type: string
      - description: Cloud service name
        in: query
        name: service
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM rules status summary
      tags:
      - CSPM
  /api/v1/cspm/scan/scanResult:
    get:
      consumes:
      - application/json
      description: Returns CSPM scan result for the provided file and cloud integration
        context.
      parameters:
      - description: File name
        in: query
        name: fileName
        required: true
        type: string
      - description: Cloud service provider
        in: query
        name: cloudServiceProvider
        required: true
        type: string
      - description: Cloud account name
        in: query
        name: cloudAccountName
        required: true
        type: string
      - description: Scan operation (e.g. cspmscan)
        in: query
        name: scanOperation
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get CSPM scan result
      tags:
      - CSPM
  /api/v1/cspm/scan/trigger:
    post:
      consumes:
      - application/json
      description: Triggers a CSPM scan for the given hub and cloud account.
      parameters:
      - description: CSPM scan request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_opsmx_ai-guardian-api_pkg_models.CSPMScanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body or missing required fields
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Upstream error
          schema:
            additionalProperties: true
            type: object
      security:
      - ApiKeyAuth: []
      summary: Trigger a CSPM scan
      tags:
      - CSPM
  /api/v1/features:
    get:
      consumes:
      - application/json
      description: Returns the features for the user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No features found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get Features by user auth
      tags:
      - Features
  /api/v1/feedback/send:
    post:
      consumes:
      - multipart/form-data
      description: Accepts user feedback with optional file attachments and sends
        to admin emails
      parameters:
      - description: Feedback message
        in: formData
        name: message
        required: true
        type: string
      - description: File attachments (max 15MB total, 8MB per file)
        in: formData
        name: attachments
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Feedback sent successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: File too large
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Send user feedback
      tags:
      - Feedback
  /api/v1/hubs:
    post:
      consumes:
      - application/json
      description: Creates a new hub with the provided details
      parameters:
      - description: Hub creation details
        in: body
        name: request
