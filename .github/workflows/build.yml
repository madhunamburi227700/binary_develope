name: Go Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/OpsMx/*

    steps:
    - name: Set GOPRIVATE for Go modules
      run: git config --global url."https://${{secrets.GIT_TOKEN}}:x-oauth-basic@github.com".insteadOf "https://github.com"
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Install dependencies
      run: go mod download

    - name: Verify go mod tidy
      run: go mod tidy -v

    - name: Build
      run: go build -v ./...
