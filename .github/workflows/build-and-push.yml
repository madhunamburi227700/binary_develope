name: Build and Push AI Guardian API

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CONTAINER_REGISTRY: quay.io/opsmxpublic

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.get-image-name.outputs.image }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build variables
        id: build_variables
        run: |
          echo "REPO=ai-guardian-api" >> $GITHUB_OUTPUT
          echo "VERSION=1.0.0" >> $GITHUB_OUTPUT
          echo "GITHASH=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILDDATE=$(date -u +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GIT_TOKEN=${{ secrets.GIT_TOKEN }}
          build-args: |
            BUILD_DATE=${{ steps.build_variables.outputs.BUILDDATE }}
            VCS_REF=${{ steps.build_variables.outputs.GITHASH }}
            VERSION=${{ steps.build_variables.outputs.VERSION }}
          tags: |
            ${{ env.CONTAINER_REGISTRY }}/${{ steps.build_variables.outputs.REPO }}:${{ steps.build_variables.outputs.VERSION }}-${{ steps.build_variables.outputs.GITHASH }}-${{ steps.build_variables.outputs.BUILDDATE }}

      - name: Get IMAGE NAME
        id: get-image-name
        run: |
          imageName="${{ env.CONTAINER_REGISTRY }}/${{ steps.build_variables.outputs.REPO }}:${{ steps.build_variables.outputs.VERSION }}-${{ steps.build_variables.outputs.GITHASH }}-${{ steps.build_variables.outputs.BUILDDATE }}"
          echo "image=$imageName" >> $GITHUB_OUTPUT
          echo "Built image: $imageName"
