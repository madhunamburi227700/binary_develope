serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: 'ai-guardian-api'
        scrape_interval: 30s
        scrape_timeout: 10s
        
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['ai-rem-dev']
        
        relabel_configs:
          # Keep only pods with prometheus.io/scrape=true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          
          # Keep only ai-guardian-api pods
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: ai-guardian-api
          
          # Use prometheus.io/port annotation for scrape port
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          
          # Use prometheus.io/path annotation for metrics path
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            regex: (.+)
            target_label: __metrics_path__
          
          # Add kubernetes metadata as labels
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app
            
      - job_name: 'ai-guardian-remediation'
        scrape_interval: 30s
        scrape_timeout: 10s
        
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['ai-rem-dev']
        
        relabel_configs:
          # Keep only pods with prometheus.io/scrape=true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          
          # Keep only ai-guardian-remediation pods
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: ai-guardian-remediation
          
          # Use prometheus.io/port annotation for scrape port
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          
          # Use prometheus.io/path annotation for metrics path
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            regex: (.+)
            target_label: __metrics_path__
          
          # Add kubernetes metadata as labels
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app
          
          - source_labels: [__meta_kubernetes_pod_label_component]
            action: replace
            target_label: component
