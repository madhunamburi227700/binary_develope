apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-guardian-api
  namespace: ai-rem-dev
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: ai-guardian-api
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        # Prometheus scraping configuration
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
      labels:
        app: ai-guardian-api
    spec:
      containers:
      - name: ai-guardian-api
        image: kuldeepbishno/ai-guardian-api:v49
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: OAUTH_BRIDGE_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              key: oauth-private-key
              name: oauth-bridge-client-secrets
        envFrom:
        - configMapRef:
            name: oauth-bridge-client-config
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config.yaml
          name: api-config-volume
          subPath: config.yaml
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: api-config-volume
        secret:
          secretName: ai-remediation-api-secret
          defaultMode: 420
