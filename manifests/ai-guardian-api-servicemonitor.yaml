apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-guardian-api
  namespace: ai-rem-dev
  labels:
    release: observability
spec:
  selector:
    matchLabels:
      app: ai-guardian-api
  namespaceSelector:
    matchNames:
      - ai-rem-dev
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
